<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise ERP Dashboard</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <!-- Top Navigation Bar -->
    <header class="bg-indigo-600 text-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold">🏫 School/College ERP Portal</h1>
        <span class="bg-green-500 text-xs px-3 py-1 rounded-full font-semibold">● Server Connected</span>
    </header>

    <div class="container mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Card 1: User Registration Form -->
        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-indigo-500">
            <h2 class="text-xl font-bold mb-4 text-indigo-700">➕ नया यूजर जोड़ें (Register Member)</h2>
            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tenant ID</label>
                    <input type="text" id="tenant_id" value="SCH101" required class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">पूरा नाम (Full Name)</label>
                    <input type="text" id="full_name" placeholder="उदा. राहुल शर्मा" required class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">ईमेल (Email)</label>
                    <input type="email" id="email" placeholder="rahul@example.com" required class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-400">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">फोन नंबर</label>
                        <input type="text" id="phone" placeholder="9876543210" required class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">रोल (Role)</label>
                        <select id="role" class="w-full p-2 border rounded bg-white">
                            <option value="STUDENT">Student</option>
                            <option value="FACULTY">Faculty</option>
                            <option value="STAFF">Staff</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded transition">
                    रजिस्टर करें (Submit)
                </button>
            </form>
            <div id="regResponse" class="mt-4 text-sm font-semibold"></div>
        </div>

        <!-- Card 2: Registered Users List -->
        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-emerald-500">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-emerald-700">📋 पंजीकृत सदस्य (Users List)</h2>
                <button onclick="fetchUsers()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-3 py-2 rounded">
                    🔄 रिफ्रेश लिस्ट
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="bg-gray-100 border-b">
                            <th class="p-2">User ID</th>
                            <th class="p-2">नाम</th>
                            <th class="p-2">रोल</th>
                            <th class="p-2">ईमेल</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="4" class="p-4 text-center text-gray-400">कोई डेटा लोड नहीं हुआ है। रिफ्रेश बटन दबाएं।</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- JavaScript code to communicate with FastAPI -->
    <script>
        const API_BASE = "http://127.0.0.1:8000/api/v2";

        // Handle Registration Form Submit
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const responseDiv = document.getElementById('regResponse');
            responseDiv.innerText = "प्रोसेस हो रहा है...";

            const payload = {
                tenant_id: document.getElementById('tenant_id').value,
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value,
                department_or_class: "Class 10",
                designation: "Member"
            };

            try {
                const res = await fetch(`${API_BASE}/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (res.ok) {
                    responseDiv.className = "mt-4 text-sm font-semibold text-green-600";
                    responseDiv.innerText = `✅ सफलतापूर्वक जुड़ गए! User ID: ${data.user_id}`;
                    fetchUsers(); // Auto refresh list
                } else {
                    responseDiv.className = "mt-4 text-sm font-semibold text-red-600";
                    responseDiv.innerText = `❌ एरर: ${data.detail || 'कुछ गड़बड़ हुई'}`;
                }
            } catch (err) {
                responseDiv.className = "mt-4 text-sm font-semibold text-red-600";
                responseDiv.innerText = "❌ सर्वर कनेक्ट नहीं हो सका!";
            }
        });

        // Fetch Users List
        async function fetchUsers() {
            const tableBody = document.getElementById('usersTableBody');
            try {
                const res = await fetch(`${API_BASE}/users/list`);
                const data = await res.json();

                if (data.users && data.users.length > 0) {
                    tableBody.innerHTML = data.users.map(u => `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-2 font-bold text-indigo-600">${u.user_id}</td>
                            <td class="p-2">${u.full_name}</td>
                            <td class="p-2"><span class="bg-gray-200 text-xs px-2 py-1 rounded">${u.role}</span></td>
                            <td class="p-2 text-gray-500">${u.email}</td>
                        </tr>
                    `).join('');
                } else {
                    tableBody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-400">कोई यूजर नहीं मिला।</td></tr>`;
                }
            } catch (err) {
                tableBody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">डेटा लोड करने में विफल!</td></tr>`;
            }
        }

        // Auto load users on page load
        fetchUsers();
    </script>
</body>
</html>
